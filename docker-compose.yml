services:
  postgres:
    image: postgres:16-alpine
    container_name: esamir_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esamir
      POSTGRES_PASSWORD: esamir_pass
      POSTGRES_DB: esamir_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esamir -d esamir_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esamir_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://esamir:esamir_pass@postgres:5432/esamir_db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@esamir.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-ESAMIR Admin}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ESAMIR
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: esamir_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://esamir:esamir_pass@postgres:5432/esamir_db
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@esamir.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-ESAMIR Admin}
    profiles:
      - migrate

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
